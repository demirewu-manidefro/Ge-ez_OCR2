<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ge'ez OCR - Home</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav>
        <a href="/" class="logo">
            <i class="fas fa-file-alt"></i>
            Ge'ez OCR
        </a>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/github">GitHub</a></li>
        </ul>
    </nav>

    <main>
        <header>
            <h1><i class="fas fa-file-alt"></i> Ge'ez OCR</h1>
            <p>Digitize Ge'ez manuscripts with AI-powered text recognition</p>
        </header>

        <div class="card">
            <div class="upload-area" id="uploadArea">
                <i class="fas fa-cloud-upload-alt"></i>
                <p>Drag & drop your image here or click to browse</p>
                <input type="file" id="fileInput" accept="image/*">
            </div>

            <img id="preview" alt="Image Preview">

            <div class="button-group">
                <button class="btn-primary" id="uploadBtn"><i class="fas fa-magic"></i> Convert to Text</button>
                <button class="btn-secondary" id="clearBtn"><i class="fas fa-trash"></i> Clear</button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Processing image...</p>
            </div>

            <div class="message" id="message"></div>

            <div class="result-section" id="resultSection" style="display: none;">
                <h3><i class="fas fa-font"></i> Recognized Text</h3>
                <textarea id="result" readonly></textarea>
                <div class="button-group" style="margin-top: 1rem;">
                    <button class="btn-success" id="copyBtn"><i class="fas fa-copy"></i> Copy Text</button>
                    <button class="btn-primary" id="downloadBtn"><i class="fas fa-file-pdf"></i> Download PDF</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Ge'ez OCR Project. All rights reserved.</p>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
